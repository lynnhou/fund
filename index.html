<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>基金数据看板</title>
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-900 text-slate-100 p-4 md:p-8 font-sans">
    <div id="app" class="max-w-4xl mx-auto space-y-6">
        <div class="flex justify-between items-center border-b border-slate-700 pb-4">
            <h1 class="text-2xl md:text-3xl font-extrabold text-transparent bg-clip-text bg-gradient-to-r from-emerald-400 to-teal-400">📊 基金实时行情看板</h1>
            <a href="admin.html" class="text-xs bg-slate-800 hover:bg-slate-700 px-3 py-1.5 rounded-lg border border-slate-600 transition">管理后台 ⚙️</a>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
            <div v-for="fund in funds" :key="fund.code" class="bg-slate-800 p-5 rounded-2xl border border-slate-700 flex justify-between items-center shadow-lg transition hover:scale-[1.01]">
                <div class="space-y-1">
                    <div class="font-bold text-lg text-slate-200 truncate max-w-[180px] md:max-w-[240px]">{{ fund.name }}</div>
                    <div class="text-xs text-slate-400 font-mono">代码: {{ fund.code }}</div>
                    <div class="text-xs text-slate-500">更新: {{ fund.time }}</div>
                </div>
                <div class="text-right">
                    <div :class="parseFloat(fund.rate) >= 0 ? 'text-rose-500' : 'text-emerald-500'" class="text-3xl font-black font-mono">
                        {{ parseFloat(fund.rate) >= 0 ? '+' : '' }}{{ fund.rate }}%
                    </div>
                    <div class="text-xs text-slate-400 mt-1">估值: {{ fund.estimate }}</div>
                </div>
            </div>
        </div>

        <div v-if="funds.length === 0" class="text-center py-12 text-slate-500">
            暂无自选基金，请前往后台添加。
        </div>
    </div>

    <script>
        Vue.createApp({
            data() { return { funds: [] } },
            methods: {
                async loadData() {
                    try {
                        const res = await fetch('api.php?action=getPublicData');
                        const json = await res.json();
                        if(json.status === 'success') this.funds = json.data;
                    } catch (e) { console.error("数据加载失败"); }
                }
            },
            mounted() {
                this.loadData();
                setInterval(this.loadData, 60000); // 每分钟自动刷新一次
            }
        }).mount('#app');
    </script>
</body>
</html>
